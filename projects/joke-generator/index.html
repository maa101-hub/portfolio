<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator | Fun Tool</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="../../index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Portfolio
            </a>
            <h1><i class="fas fa-laugh"></i> Random Joke Generator</h1>
            <p>Get a laugh with random jokes from the Official Joke API</p>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Joke Display Section -->
            <div class="joke-section">
                <div class="joke-card" id="jokeCard">
                    <div class="joke-content">
                        <p class="joke-setup" id="jokeSetup">Click the button to get started!</p>
                        <p class="joke-punchline" id="jokePunchline" style="display: none;"></p>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button class="btn btn-primary" id="getJokeBtn">
                        <i class="fas fa-refresh"></i> Get Joke
                    </button>
                    <button class="btn btn-secondary" id="copyBtn" style="display: none;">
                        <i class="fas fa-copy"></i> Copy Joke
                    </button>
                </div>

                <!-- Loading & Error States -->
                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading joke...</p>
                </div>
                <div class="error-message" id="errorMessage" style="display: none;"></div>
                <div class="success-message" id="successMessage" style="display: none;">
                    <i class="fas fa-check-circle"></i> Copied to clipboard!
                </div>
            </div>

            <!-- History Section -->
            <div class="history-section">
                <div class="history-header">
                    <h2><i class="fas fa-history"></i> Joke History</h2>
                    <button class="clear-btn" id="clearHistoryBtn" style="display: none;">
                        <i class="fas fa-trash-alt"></i> Clear
                    </button>
                </div>
                <div class="history-list" id="historyList">
                    <p class="empty-message">No jokes yet. Start by clicking "Get Joke"!</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Built with <i class="fas fa-heart"></i> using the <a href="https://official-joke-api.appspot.com/" target="_blank">Official Joke API</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
